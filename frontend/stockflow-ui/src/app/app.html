<!-- Main navigation bar -->
<nav class="navbar" *ngIf="authService.isLoggedIn()">

  <!-- LEFT SIDE -->
  <div class="nav-left">

    <!-- Brand -->
    <div class="brand">
      <span class="brand-logo">📦</span>
      <span class="brand-name">StockFlow</span>
    </div>

    <!-- Navigation Links -->
    <div class="nav-links">
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a routerLink="/reports" routerLinkActive="active">Reports</a>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="nav-right">

    <!-- User Name ONLY -->
    <div class="user-info">
      <span class="user-name">
        {{ authService.getUser()?.name }}
      </span>
    </div>

    <!-- Logout Button -->
    <button type="button"
            class="logout-btn"
            (click)="logout()">
      Logout
    </button>

  </div>

</nav>

<!-- Routed pages -->
<router-outlet></router-outlet>
