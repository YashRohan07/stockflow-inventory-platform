<!-- Main navigation bar shown only for authenticated users -->
<nav class="navbar" *ngIf="authService.isLoggedIn()">

  <!-- Left section: brand and primary navigation -->
  <div class="nav-left">

    <!-- Application brand -->
    <div class="brand">
      <span class="brand-logo">📦</span>
      <span class="brand-name">StockFlow</span>
    </div>

    <!-- Primary navigation links -->
    <div class="nav-links">
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a routerLink="/reports" routerLinkActive="active">Reports</a>
    </div>

  </div>

  <!-- Right section: current user and session action -->
  <div class="nav-right">

    <!-- Displays authenticated user's name -->
    <div class="user-info">
      <span class="user-name">
        {{ authService.getUser()?.name }}
      </span>
    </div>

    <!-- Clears current session and redirects user to login -->
    <button type="button"
            class="logout-btn"
            (click)="logout()">
      Logout
    </button>

  </div>

</nav>

<!-- Routed feature pages are rendered here -->
<router-outlet></router-outlet>
