<!-- Main navigation bar -->
<nav class="navbar">
  <!-- Show these links only when user is logged in -->
  <a *ngIf="authService.isLoggedIn()" routerLink="/dashboard">Dashboard</a>
  <a *ngIf="authService.isLoggedIn()" routerLink="/products">Products</a>
  <a *ngIf="authService.isLoggedIn()" routerLink="/reports">Reports</a>

  <!-- Logout button -->
  <button *ngIf="authService.isLoggedIn()"
          type="button"
          (click)="logout()">
    Logout
  </button>
</nav>

<!-- Routed pages will load here -->
<router-outlet></router-outlet>
