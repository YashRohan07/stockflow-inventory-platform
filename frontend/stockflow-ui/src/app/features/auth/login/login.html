<div class="login-container">

  <div class="login-card">

    <!-- Updated Header -->
    <h2>Sign in to StockFlow</h2>
    <p class="subtitle">Manage your products and inventory efficiently</p>

    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm">

      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input type="email"
               formControlName="email"
               placeholder="Enter your email" />

        <small *ngIf="f['email'].touched && f['email'].invalid" class="error">
          Enter a valid email
        </small>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>

        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="Enter your password" />

          <!-- 👁️ Toggle -->
          <span class="toggle-icon"
                (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁️' }}
          </span>
        </div>

        <small *ngIf="f['password'].touched && f['password'].invalid" class="error">
          Password is required
        </small>
      </div>

      <!-- Global error -->
      <div *ngIf="errorMessage" class="error">
        {{ errorMessage }}
      </div>

      <!-- Button -->
      <button type="submit"
              [disabled]="loginForm.invalid || isSubmitting">

        {{ isSubmitting ? 'Logging in...' : 'Login' }}
      </button>

    </form>

  </div>

</div>
