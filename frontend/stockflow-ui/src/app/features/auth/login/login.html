<div class="login-container">
  <div class="login-card">
    <h2>Sign in to StockFlow</h2>
    <p class="subtitle">Manage your products and inventory efficiently</p>

    <form (ngSubmit)="onSubmit()" [formGroup]="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email"
               formControlName="email"
               placeholder="Enter your email" />

        <small *ngIf="f['email'].touched && f['email'].invalid" class="error">
          Enter a valid email.
        </small>
      </div>

      <div class="form-group">
        <label>Password</label>

        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="Enter your password" />

          <span class="toggle-icon" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁️' }}
          </span>
        </div>

        <small *ngIf="f['password'].touched && f['password'].invalid" class="error">
          Password is required.
        </small>
      </div>

      <div *ngIf="errorMessage" class="login-error">
        {{ errorMessage }}
      </div>

      <button type="submit"
              class="btn-login"
              [disabled]="loginForm.invalid || isSubmitting">
        {{ isSubmitting ? 'Logging in...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
