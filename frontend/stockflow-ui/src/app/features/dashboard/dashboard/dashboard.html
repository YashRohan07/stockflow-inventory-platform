<section class="dashboard">
  <div class="dashboard-card">
    <h2>Dashboard</h2>

    <p>Backend Status</p>

    <strong class="status"
            [class.success]="backendStatus() === 'Healthy'"
            [class.error]="!backendStatus()">
      {{ healthMessage() }}
    </strong>

    @if (backendStatus()) {
    <p>Status: {{ backendStatus() }}</p>
    }

    @if (applicationName()) {
    <p>Application: {{ applicationName() }}</p>
    }
  </div>
</section>
