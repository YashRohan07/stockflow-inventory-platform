<!-- Product list page container -->
<section class="product-list">

  <!-- Page title -->
  <h2>Products</h2>

  <!-- Short page description -->
  <p>Product list page is ready.</p>

  <!-- Product table -->
  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>Name</th>
        <th>Size</th>
        <th>Color</th>
        <th>Quantity</th>
        <th>Purchase Price</th>
      </tr>
    </thead>

    <tbody>
      <!-- Loop through product list -->
      @for (product of products(); track product.id) {
      <tr>
        <td>{{ product.sku }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.size }}</td>
        <td>{{ product.color }}</td>
        <td>{{ product.quantity }}</td>
        <td>{{ product.purchasePrice }}</td>
      </tr>
      }
    </tbody>
  </table>
</section>
